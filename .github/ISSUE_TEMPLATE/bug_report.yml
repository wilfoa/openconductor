name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? Be as specific as possible.
      placeholder: |
        1. Run `openconductor` with config...
        2. Open project X
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant output from `~/.openconductor/openconductor.log` (run with `--debug` for verbose logs).
      render: text

  - type: input
    id: version
    attributes:
      label: OpenConductor version
      description: Output of `openconductor --version` or commit hash.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: input
    id: agent
    attributes:
      label: Agent(s) in use
      description: Which AI agent(s) were you using? (e.g. claude-code, opencode, codex, gemini)
    validations:
      required: true
